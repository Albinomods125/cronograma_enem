<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enem Quest: A Jornada da Aprovação</title>
    <style>
        :root {
            --bg-principal: #0b0f19;
            --bg-card: #151f32;
            --cor-neon: #58cc02; /* Verde Duolingo */
            --cor-neon-hover: #46a302;
            --cor-xp: #ffc800; /* Amarelo Coroa */
            --cor-texto: #ffffff;
            --cor-mutada: #94a3b8;
            --cor-borda: #243553;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background-color: var(--bg-principal);
            color: var(--cor-texto);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 768px) {
            .container { grid-template-columns: 2.2fr 1fr; }
            header { grid-column: span 2; }
        }

        /* Topbar Perfil & Gamificação */
        header {
            background: var(--bg-card);
            border: 2px solid var(--cor-borda);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .perfil-info { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 50px; height: 50px; background: var(--cor-neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        
        .status-gamificado { display: flex; gap: 20px; font-weight: bold; font-size: 1.1rem; }
        .status-item { display: flex; align-items: center; gap: 8px; }
        .status-item.fogo { color: #ff4b4b; animation: pulso 1.5s infinite; }
        .status-item.xp { color: var(--cor-xp); }

        /* Barra de Nível Superior */
        .nivel-container { width: 100%; max-width: 250px; }
        .nivel-barra { width: 100%; height: 12px; background: var(--cor-borda); border-radius: 6px; overflow: hidden; margin-top: 5px; }
        .nivel-progresso { height: 100%; width: 0%; background: var(--cor-neon); transition: width 0.4s ease; }

        /* Estilo das Abas de Missão (Semanas) */
        .semana-abas { display: flex; gap: 10px; margin-bottom: 20px; background: #070a12; padding: 6px; border-radius: 12px; border: 2px solid var(--cor-borda); }
        .btn-aba { flex: 1; padding: 12px; border: none; background: transparent; color: var(--cor-mutada); border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-aba.active { background: var(--cor-borda); color: var(--cor-neon); box-shadow: 0 0 10px rgba(88, 204, 2, 0.2); }

        /* Cards do Caminho das Missões */
        .missao-card {
            background: var(--bg-card);
            border: 2px solid var(--cor-borda);
            border-bottom: 6px solid var(--cor-borda); /* Efeito 3D Duolingo */
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            transition: all 0.2s ease;
        }

        .missao-card.concluida { border-color: var(--cor-neon); border-bottom-color: var(--cor-neon-hover); }

        .missao-titulo { font-size: 1.2rem; color: #ffffff; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }

        /* Blocos Interativos de Questões */
        .bloco-estudo {
            background: #1c283f;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bloco-topo { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        .btn-check {
            width: 32px; height: 32px; border-radius: 50%; border: 3px solid var(--cor-borda);
            background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: transparent; font-size: 1.1rem; transition: 0.2s;
        }
        .btn-check.checked { background: var(--cor-neon); border-color: var(--cor-neon); color: white; }

        .btn-aula {
            background: #2b3a55; color: var(--cor-texto); border: none; padding: 8px 14px;
            border-bottom: 3px solid #1a2436; border-radius: 10px; font-weight: bold; cursor: pointer;
            text-decoration: none; font-size: 0.85rem; transition: 0.1s;
        }
        .btn-aula:active { transform: translateY(2px); border-bottom-width: 1px; }

        /* inputs de Rendimento */
        .painel-rendimento { display: flex; gap: 10px; align-items: center; font-size: 0.85rem; color: var(--cor-mutada); background: #151f32; padding: 8px; border-radius: 8px; }
        .painel-rendimento input { width: 55px; background: #0b0f19; border: 2px solid var(--cor-borda); border-radius: 6px; padding: 4px; color: white; text-align: center; font-weight: bold; }

        /* Sidebar: Timer & Conquistas */
        .sidebar-box { background: var(--bg-card); border: 2px solid var(--cor-borda); border-radius: 18px; padding: 25px; text-align: center; }
        
        .pomodoro-circulo {
            width: 150px; height: 150px; border-radius: 50%; border: 6px dashed var(--cor-borda);
            margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .time-text { font-size: 2.2rem; font-weight: bold; font-family: monospace; }
        
        .btn-pomo { padding: 10px 20px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; margin: 4px; color: white; border-bottom: 4px solid rgba(0,0,0,0.2); }
        .btn-pomo-start { background: var(--cor-neon); }
        .btn-pomo-reset { background: var(--danger); }

        @keyframes pulso { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="perfil-info">
            <div class="avatar">🦉</div>
            <div>
                <h3>Jogador de Elite</h3>
                <div class="nivel-container">
                    <span id="txt-lvl">Nível 1 (Iniciante)</span>
                    <div class="nivel-barra"><div class="nivel-progresso" id="lvl-progresso"></div></div>
                </div>
            </div>
        </div>
        <div class="status-gamificado">
            <div class="status-item fogo" title="Ofensiva Diária">🔥 <span id="streak-num">1</span> Dias</div>
            <div class="status-item xp" title="Experiência Acumulada">👑 <span id="xp-num">0</span> XP</div>
        </div>
    </header>

    <div class="main-content">
        <div class="semana-abas">
            <button class="btn-aba active" onclick="mudarSemana(1)">Fase 1</button>
            <button class="btn-aba" onclick="mudarSemana(2)">Fase 2</button>
            <button class="btn-aba" onclick="mudarSemana(3)">Fase 3</button>
            <button class="btn-aba" onclick="mudarSemana(4)">Fase 4</button>
        </div>
        <div id="jornada-conteudo"></div>
    </div>

    <div class="sidebar">
        <div class="sidebar-box">
            <h3 style="color: var(--cor-neon);">🍅 Arena de Foco</h3>
            <div id="lbl-pomo" style="font-weight: bold; margin-top: 10px;">FOCO</div>
            <div class="pomodoro-circulo">
                <div class="time-text" id="clock-display">25:00</div>
            </div>
            <button class="btn-pomo btn-pomo-start" onclick="startTimer()">Iniciar</button>
            <button class="btn-pomo btn-pomo-reset" onclick="resetTimer()">Resetar</button>
            <p style="font-size: 0.85rem; color: var(--cor-mutada); margin-top: 15px;">Ganhe <b>+50 XP</b> por ciclo de foco completo!</p>
        </div>
    </div>
</div>

<script>
    const cronogramaGamer = {
        1: [
            { dia: "Missão 1: Segunda-feira", t1: "Matemática Básica Razão Regra de 3", t1_lbl: "Dominar Razão, Proporção e Regra de Três", t2: "Biologia Ecologia Cadeias alimentares", t2_lbl: "Destrinchar Cadeias Alimentares e Impactos" },
            { dia: "Missão 2: Terça-feira", t1: "História Brasil Colônia", t1_lbl: "Infiltrar no Brasil Colônia", t2: "Geografia Questões agrárias", t2_lbl: "Mapear Questões Agrárias" },
            { dia: "Missão 3: Quarta-feira", t1: "Matemática Básica Porcentagem", t1_lbl: "Hackear Porcentagens e Frações", t2: "Química Química Ambiental Poluição", t2_lbl: "Neutralizar Poluição e Efeito Estufa" }
        ],
        2: [
            { dia: "Missão 4: Segunda-feira", t1: "Estatística Gráficos média moda mediana", t1_lbl: "Análise de Gráficos e Medidas Centrais", t2: "Biologia Citologia Fisiologia Humana", t2_lbl: "Desvendar Células e Fisiologia" }
        ] // Adicione as demais semanas replicando esse padrão estrutural compacto
    };

    let estadoGamer = JSON.parse(localStorage.getItem('estadoGamerEnem')) || {
        checkadas: {},
        exercicios: {},
        xp: 0,
        streak: 1
    };

    let timerInterval = null;
    let timeRemaining = 25 * 60;
    let isWorking = true;
    let currentSemana = 1;

    function salvarGamer() {
        localStorage.setItem('estadoGamerEnem', JSON.stringify(estadoGamer));
        atualizarLayoutStats();
    }

    function atualizarLayoutStats() {
        document.getElementById('xp-num').innerText = estadoGamer.xp;
        document.getElementById('streak-num').innerText = estadoGamer.streak;
        
        // Regra de nível: Cada 100 XP sobe 1 nível
        let nivelAtual = Math.floor(estadoGamer.xp / 100) + 1;
        let xpDoNivelAtual = estadoGamer.xp % 100;
        
        document.getElementById('txt-lvl').innerText = `Nível ${nivelAtual} (Proporção Rumo ao Topo)`;
        document.getElementById('lvl-progresso').style.width = `${xpDoNivelAtual}%`;
    }

    function renderizarJornada(semanaNum) {
        const container = document.getElementById('jornada-conteudo');
        container.innerHTML = '';
        currentSemana = semanaNum;

        if (!cronogramaGamer[semanaNum]) {
            container.innerHTML = `<p style="color:var(--cor-mutada)">Fase em desenvolvimento. Conclua as fases anteriores!</p>`;
            return;
        }

        cronogramaGamer[semanaNum].forEach((item, index) => {
            const id1 = `s${semanaNum}d${index}t1`;
            const id2 = `s${semanaNum}d${index}t2`;

            const card = document.createElement('div');
            card.className = `missao-card ${(estadoGamer.checkadas[id1] && estadoGamer.checkadas[id2]) ? 'concluida' : ''}`;
            
            card.innerHTML = `
                <h3 class="missao-titulo">⚔️ ${item.dia}</h3>
                
                <div class="bloco-estudo">
                    <div class="bloco-topo">
                        <button class="btn-check ${estadoGamer.checkadas[id1] ? 'checked' : ''}" onclick="toggleMissao('${id1}', 20)">✓</button>
                        <span style="flex:1; margin-left:15px;">${item.t1_lbl}</span>
                        <a class="btn-aula" href="https://www.youtube.com/results?search_query=${encodeURIComponent(item.t1 + ' enem')}" target="_blank">▶ Vídeo</a>
                    </div>
                </div>

                <div class="bloco-estudo">
                    <div class="bloco-topo">
                        <button class="btn-check ${estadoGamer.checkadas[id2] ? 'checked' : ''}" onclick="toggleMissao('${id2}', 20)">✓</button>
                        <span style="flex:1; margin-left:15px;">${item.t2_lbl}</span>
                        <a class="btn-aula" href="https://www.youtube.com/results?search_query=${encodeURIComponent(item.t2 + ' enem')}" target="_blank">▶ Vídeo</a>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function toggleMissao(id, valorXp) {
        if (!estadoGamer.checkadas[id]) {
            estadoGamer.checkadas[id] = true;
            estadoGamer.xp += valorXp;
        } else {
            estadoGamer.checkadas[id] = false;
            estadoGamer.xp = Math.max(0, estadoGamer.xp - valorXp);
        }
        salvarGamer();
        renderizarJornada(currentSemana);
    }

    function mudarSemana(num) {
        document.querySelectorAll('.btn-aba').forEach((btn, idx) => {
            btn.classList.toggle('active', idx === (num - 1));
        });
        renderizarJornada(num);
    }

    /* Timer Inteligente */
    function startTimer() {
        if (timerInterval !== null) return;
        timerInterval = setInterval(() => {
            if (timeRemaining > 0) {
                timeRemaining--;
                let min = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
                let sec = (timeRemaining % 60).toString().padStart(2, '0');
                document.getElementById('clock-display').innerText = `${min}:${sec}`;
            } else {
                clearInterval(timerInterval);
                timerInterval = null;
                if (isWorking) {
                    estadoGamer.xp += 50; // Recompensa por foco
                    alert("⚔️ Ciclo de Foco Concluído! Você faturou +50 XP!");
                    isWorking = false;
                    timeRemaining = 5 * 60;
                    document.getElementById('lbl-pomo').innerText = "PAUSA RECOMPENSA";
                } else {
                    isWorking = true;
                    timeRemaining = 25 * 60;
                    document.getElementById('lbl-pomo').innerText = "FOCO";
                }
                salvarGamer();
                startTimer();
            }
        }, 1000);
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        timeRemaining = 25 * 60;
        document.getElementById('clock-display').innerText = "25:00";
        document.getElementById('lbl-pomo').innerText = "FOCO";
    }

    // Init
    atualizarLayoutStats();
    renderizarJornada(1);
</script>
</body>
</html>
